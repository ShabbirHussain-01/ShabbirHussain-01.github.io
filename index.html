<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════
//  VISITOR SYSTEM — Name capture, welcome prompt, no duplicates
// ═══════════════════════════════════════════════════════════════
const VisitorSystem = {
  STORAGE_KEY: 'sh_visitors_v2',
  WELCOMED_KEY: 'sh_welcomed',

  hasBeenWelcomed() {
    return sessionStorage.getItem(this.WELCOMED_KEY) === 'true';
  },

  markWelcomed() {
    sessionStorage.setItem(this.WELCOMED_KEY, 'true');
  },

  getVisitorName() {
    const data = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]');
    const currentSession = sessionStorage.getItem('sh_session_id');
    const visitor = data.find(v => v.sessionId === currentSession);
    return visitor ? visitor.name : null;
  },

  logVisitor(name) {
    const now = new Date();
    const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    sessionStorage.setItem('sh_session_id', sessionId);

    const existing = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]');

    // Check if this exact name already visited today (prevent duplicates)
    const today = now.toLocaleDateString('en-IN');
    const alreadyToday = existing.find(v => v.name === name && v.date === today);

    const entry = {
      id: Date.now(),
      sessionId,
      name: name || 'Anonymous',
      date: now.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}),
      time: now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}),
      day: now.toLocaleDateString('en-IN', {weekday:'long'}),
      tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
      device: /Mobi|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
      browser: (() => {
        const ua = navigator.userAgent;
        if(ua.includes('Chrome')) return 'Chrome';
        if(ua.includes('Firefox')) return 'Firefox';
        if(ua.includes('Safari')) return 'Safari';
        if(ua.includes('Edge')) return 'Edge';
        return 'Other';
      })(),
      os: (() => {
        const ua = navigator.userAgent;
        if(ua.includes('Mac')) return 'macOS';
        if(ua.includes('Win')) return 'Windows';
        if(ua.includes('Linux')) return 'Linux';
        if(ua.includes('Android')) return 'Android';
        if(ua.includes('iOS')||ua.includes('iPhone')) return 'iOS';
        return 'Unknown';
      })(),
      lang: navigator.language || 'en',
      screen: `${screen.width}x${screen.height}`,
      referrer: document.referrer || 'Direct',
      path: window.location.pathname
    };

    const updated = [entry, ...existing].slice(0, 500);
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(updated));
    localStorage.setItem('sh_total', updated.length);
    return { entry, isDuplicate: !!alreadyToday, total: updated.length };
  },

  getAll() {
    return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]');
  },

  getCount() {
    return parseInt(localStorage.getItem('sh_total') || '0');
  },

  exportCSV() {
    const rows = this.getAll();
    if(!rows.length) { alert('No visitor data yet.'); return; }
    const headers = ['ID','Name','Date','Day','Time','Timezone','Device','Browser','OS','Language','Screen','Referrer'];
    const csv = [headers.join(','), ...rows.map(r =>
      [r.id,r.name,r.date,r.day,r.time,r.tz,r.device,r.browser,r.os,r.lang,r.screen,r.referrer||''].map(v=>`"${v}"`).join(',')
    )].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `shabbir-visitors-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  },

  clearAll() {
    localStorage.removeItem(this.STORAGE_KEY);
    localStorage.removeItem('sh_total');
  }
};

// ═══════════════════════════════════════════════════════════════
//  OTP SYSTEM — Generates random 6-digit OTP, stores with expiry
// ═══════════════════════════════════════════════════════════════
const OTPSystem = {
  generate() {
    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    const expiry = Date.now() + 5 * 60 * 1000; // 5 minutes
    sessionStorage.setItem('sh_owner_otp', JSON.stringify({otp, expiry}));
    return otp;
  },

  verify(inputOtp) {
    const stored = JSON.parse(sessionStorage.getItem('sh_owner_otp') || '{}');
    if (!stored.otp || Date.now() > stored.expiry) return false;
    return stored.otp === inputOtp;
  },

  clear() {
    sessionStorage.removeItem('sh_owner_otp');
  }
};

const RolesSystem = {

    const defaultRoles = [
      {id:1, title:'Data Engineer (Azure/Databricks)', type:'Full-time', location:'Bangalore / Remote', status:'Active', posted:'2026-04-15', description:'Seeking a data engineer with 2+ years experience in Azure Data Factory, Databricks, and SQL. Experience with Medallion Architecture preferred.'},

    ];
    return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || defaultRoles;
  },

  saveRoles(roles) {
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(roles));
  },

  addRole(role) {
    const roles = this.getRoles();
    roles.unshift({...role, id: Date.now(), posted: new Date().toISOString().slice(0,10)});
    this.saveRoles(roles);
    return roles;
  },

  deleteRole(id) {
    const roles = this.getRoles().filter(r => r.id !== id);
    this.saveRoles(roles);
    return roles;
  },

  updateRole(id, updates) {
    const roles = this.getRoles().map(r => r.id === id ? {...r, ...updates} : r);
    this.saveRoles(roles);
    return roles;
  }
};

function useParticles(isDark) {
  useEffect(() => {
    const c = document.getElementById('bg');
    if(!c) return;
    const ctx = c.getContext('2d');
    let raf;
    const resize = () => { c.width = innerWidth; c.height = innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const pts = Array.from({length:90}, () => ({
      x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      vx: (Math.random()-.5)*.2, vy: (Math.random()-.5)*.2,
      r: Math.random()*1.5+.3, pulse: Math.random()*Math.PI*2
    }));
    const tick = () => {
      ctx.clearRect(0,0,c.width,c.height);
      const col = isDark ? '201,168,76' : '100,80,20';
      pts.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.pulse+=0.02;
        if(p.x<0||p.x>c.width) p.vx*=-1;
        if(p.y<0||p.y>c.height) p.vy*=-1;
        const pulseR = p.r + Math.sin(p.pulse)*0.3;
        ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,pulseR),0,Math.PI*2);
        ctx.fillStyle=`rgba(${col},${.4+Math.sin(p.pulse)*.2})`; ctx.fill();
      });
      pts.forEach((a,i) => pts.slice(i+1).forEach(b => {
        const d = Math.hypot(a.x-b.x,a.y-b.y);
        if(d<140) { ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(${col},${(1-d/140)*.1})`; ctx.lineWidth=.4; ctx.stroke(); }
      }));
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
  }, [isDark]);
}

function useGrain() {
  useEffect(() => {
    const canvas = document.getElementById('grainCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width = 256;
    const h = canvas.height = 256;
    const idata = ctx.createImageData(w,h);
    const buffer = new Uint32Array(idata.data.buffer);
    let raf;
    const noise = () => {
      for(let i=0;i<buffer.length;i++) buffer[i] = ((Math.random()*255)|0) << 24;
      ctx.putImageData(idata,0,0);
      raf = requestAnimationFrame(noise);
    };
    noise();
    return () => cancelAnimationFrame(raf);
  }, []);
}

function useSpotlight() {
  useEffect(() => {
    const spot = document.getElementById('spotlight');
    if(!spot) return;
    const move = (e) => {
      spot.style.setProperty('--sx', e.clientX+'px');
      spot.style.setProperty('--sy', e.clientY+'px');
      spot.style.opacity = '1';
    };
    const leave = () => { spot.style.opacity = '0'; };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseleave', leave);
    return () => { document.removeEventListener('mousemove',move); document.removeEventListener('mouseleave',leave); };
  }, []);
}

function useCursor() {
  useEffect(() => {
    if(/Mobi|Android/i.test(navigator.userAgent)) { document.body.classList.add('mobile'); return; }
    const cur = document.getElementById('cur'), ring = document.getElementById('cur-r');
    if(!cur || !ring) return;
    let mx=0,my=0,rx=0,ry=0;
    const move = e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; };
    const loop = () => { rx+=(mx-rx)*.15; ry+=(my-ry)*.15; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); };
    const over = () => ring.classList.add('hover');
    const out = () => ring.classList.remove('hover');
    document.addEventListener('mousemove',move);
    document.querySelectorAll('a,button,[role="button"],.tilt-card').forEach(el=>{el.addEventListener('mouseenter',over);el.addEventListener('mouseleave',out);});
    loop();
    return () => { document.removeEventListener('mousemove',move); };
  }, []);
}

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
    }, {threshold:.06, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.rv').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useTilt(ref) {
  useEffect(() => {
    const el = ref.current;
    if(!el) return;
    const handleMove = (e) => {
      const rect = el.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - .5;
      const y = (e.clientY - rect.top) / rect.height - .5;
      el.style.transform = `perspective(1000px) rotateY(${x*12}deg) rotateX(${-y*12}deg) scale3d(1.02,1.02,1.02)`;
    };
    const handleLeave = () => { el.style.transform = 'perspective(1000px) rotateY(0) rotateX(0) scale3d(1,1,1)'; };
    el.addEventListener('mousemove', handleMove);
    el.addEventListener('mouseleave', handleLeave);
    return () => { el.removeEventListener('mousemove',handleMove); el.removeEventListener('mouseleave',handleLeave); };
  }, [ref]);
}

function usePreloader() {
  const [done, setDone] = useState(false);
  useEffect(() => {
    const timer = setTimeout(() => {
      const pl = document.getElementById('preloader');
      if(pl) pl.classList.add('done');
      setTimeout(() => setDone(true), 1000);
    }, 2800);
    return () => clearTimeout(timer);
  }, []);
  return done;
}

function Counter({target, suffix='', duration=2200}) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if(e.isIntersecting) {
        let start=0; const step=target/(duration/16);
        const timer = setInterval(()=>{ start+=step; if(start>=target){setVal(target);clearInterval(timer);}else setVal(Math.floor(start)); },16);
        obs.disconnect();
      }
    },{threshold:.4});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[target,duration]);
  return <span ref={ref}>{val}{suffix}</span>;
}

function TypewriterText({text, speed=50, delay=0}) {
  const [display, setDisplay] = useState('');
  const [done, setDone] = useState(false);
  useEffect(() => {
    const timer = setTimeout(() => {
      let i=0;
      const interval = setInterval(()=>{
        if(i<text.length){setDisplay(text.slice(0,i+1));i++;}
        else{clearInterval(interval);setDone(true);}
      },speed);
      return ()=>clearInterval(interval);
    },delay);
    return ()=>clearTimeout(timer);
  },[text,speed,delay]);
  return <span>{display}{!done&&<span style={{borderRight:'2px solid #c9a84c',animation:'blink .75s step-end infinite'}}>&nbsp;</span>}</span>;
}

function SkillBar({level, color, delay=0}) {
  const ref = useRef();
  const [w, setW] = useState(0);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if(e.isIntersecting) { setTimeout(()=>setW(level),delay); obs.disconnect(); }
    },{threshold:.3});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[level,delay]);
  return <div ref={ref} style={{height:'100%', width:w+'%', background:color, borderRadius:3, transition:'width 1.5s cubic-bezier(.23,1,.32,1)', position:'relative', overflow:'hidden'}}>
    <div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)',animation:'shimmer 2s infinite'}}></div>
  </div>;
}

function MagneticButton({children, style, onClick, className=''}) {
  const ref = useRef();
  const handleMove = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;
    ref.current.style.transform = `translate(${x*.2}px,${y*.2}px)`;
  };
  const handleLeave = () => { ref.current.style.transform = 'translate(0,0)'; };
  return <button ref={ref} className={`magnetic-btn ${className}`} style={style} onClick={onClick} onMouseMove={handleMove} onMouseLeave={handleLeave}>{children}</button>;
}

      const name = VisitorSystem.getVisitorName();
      if (name) setVisitorName(name);
      const count = VisitorSystem.getCount();
      setVisitorCount(count);
    }

//  EMAIL FORM
// ═══════════════════════════════════════════════════════════════
function EmailForm({c, css}) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [subject, setSubject] = useState('');
  const [msg, setMsg] = useState('');
  const [sent, setSent] = useState(false);

  const send = () => {
    if(!name || !msg) { alert('Please fill your name and message.'); return; }
    const mailto = `mailto:shabbircampus@gmail.com?subject=${encodeURIComponent(subject||'Portfolio Inquiry')}&body=${encodeURIComponent(`From: ${name} (${email || 'No email provided'})\n\n${msg}`)}`;
    window.open(mailto);
    setSent(true);
    setTimeout(()=>setSent(false),3000);
  };

  return (
    <div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16}}>
        <div>
          <label style={{display:'block', fontSize:10, color:c.muted, letterSpacing:'2px', textTransform:'uppercase', marginBottom:8, fontWeight:500}}>Name *</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your full name" style={css.input}/>
        </div>
        <div>
          <label style={{display:'block', fontSize:10, color:c.muted, letterSpacing:'2px', textTransform:'uppercase', marginBottom:8, fontWeight:500}}>Email</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" style={css.input}/>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <label style={{display:'block', fontSize:10, color:c.muted, letterSpacing:'2px', textTransform:'uppercase', marginBottom:8, fontWeight:500}}>Subject</label>
        <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="What is this about?" style={css.input}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{display:'block', fontSize:10, color:c.muted, letterSpacing:'2px', textTransform:'uppercase', marginBottom:8, fontWeight:500}}>Message *</label>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Tell me about your project, role, or question..." rows={5}
          style={{...css.input, resize:'vertical', lineHeight:1.8}}/>
      </div>
      <MagneticButton style={{...css.btn, width:'100%', padding:18}} onClick={send}>
        {sent ? '✓ Opening Email Client...' : 'Send Message →'}
      </MagneticButton>
      <div style={{marginTop:12, fontSize:11, color:c.muted, textAlign:'center', fontStyle:'italic'}}>
        This opens your default email application
      </div>
    </div>
  );
}

  useEffect(()=>{ document.body.style.overflow='hidden'; return()=>{ document.body.style.overflow=''; }; },[]);

  return (
    <div style={{position:'fixed',inset:0,zIndex:800,background:'rgba(4,8,15,0.96)',
      backdropFilter:'blur(24px)',overflowY:'auto',display:'flex',alignItems:'flex-start',
      justifyContent:'center',padding:'40px 20px'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:c.card,border:`1px solid ${c.border2}`,borderRadius:24,maxWidth:900,
        width:'100%',position:'relative',animation:'fadeUp .5s cubic-bezier(.23,1,.32,1)', overflow:'hidden'}}>

        {/* Header with visual */}
        <div style={{height:300,background:c.bg2,borderRadius:'24px 24px 0 0',
          display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
          borderBottom:`1px solid ${c.border}`, position:'relative'}}>
          <div style={{width:'90%',height:'90%'}}><ProjVisual id={p.id} c={c} dark={dark}/></div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'60px 40px 30px',
            background:`linear-gradient(transparent,${c.card})`}}>
            <div style={{fontSize:11,color:c.gold,letterSpacing:'3px',textTransform:'uppercase',marginBottom:8,fontWeight:500}}>{p.eyebrow}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:32,fontWeight:700,color:c.text}}>{p.title}</div>
          </div>
        </div>

        <button onClick={onClose} style={{position:'absolute',top:24,right:24,background:c.card2,
          border:`1px solid ${c.border}`,borderRadius:'50%',width:48,height:48,
          display:'flex',alignItems:'center',justifyContent:'center',cursor:'none',
          color:c.text,fontSize:20,transition:'all .2s',zIndex:10}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=c.gold;e.currentTarget.style.color=c.gold;e.currentTarget.style.transform='rotate(90deg)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.color=c.text;e.currentTarget.style.transform='none'}}>✕</button>

        <div style={{padding:40}}>
          {/* Impact pills */}
          <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:28}}>
            {p.impacts.map(imp=><span key={imp} style={css.pill}>{imp}</span>)}
          </div>

          {/* Meta info */}
          <div style={{display:'flex',gap:24,marginBottom:28,flexWrap:'wrap',fontSize:12,color:c.muted}}>
            <span>⏱️ {p.timeline}</span>
            <span>👥 {p.team}</span>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',gap:4,marginBottom:28,borderBottom:`1px solid ${c.border}`,paddingBottom:4}}>
            {tabs.map(tab=>[
              <button key={tab} onClick={()=>setActiveTab(tab)}
                style={{padding:'10px 20px',background:activeTab===tab?c.accent3:'none',border:'none',borderRadius:8,
                  color:activeTab===tab?c.gold:c.muted,fontSize:12,fontFamily:"'Inter',sans-serif",fontWeight:500,
                  textTransform:'uppercase',letterSpacing:'1px',cursor:'none',transition:'all .3s'}}>
                {tab}
              </button>
            ])}
          </div>

          {/* Tab Content */}
          {activeTab==='overview' && (
            <div style={{animation:'fadeUp .4s ease'}}>
              <div style={{fontSize:11,color:c.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12,fontWeight:500}}>Project Overview</div>
              <div style={{fontSize:14,color:c.muted,lineHeight:2,fontStyle:'italic',marginBottom:28}}>{p.overview}</div>
              <div style={{fontSize:11,color:c.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12,fontWeight:500}}>Technology Stack</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:28}}>
                {p.tools.map(t=><span key={t} style={css.tag}>{t}</span>)}
              </div>
              {p.testimonials.length>0 && (
                <div style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:24,marginTop:20}}>
                  <div style={{fontSize:24,marginBottom:12}}>❝</div>
                  <div style={{fontSize:14,color:c.text,lineHeight:1.8,fontStyle:'italic',marginBottom:16}}>{p.testimonials[0].text}</div>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:40,height:40,borderRadius:'50%',background:c.gold2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>👤</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:c.text}}>{p.testimonials[0].name}</div>
                      <div style={{fontSize:11,color:c.muted}}>{p.testimonials[0].role}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {activeTab==='architecture' && (
            <div style={{animation:'fadeUp .4s ease'}}>
              <div style={{fontSize:11,color:c.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:20,fontWeight:500}}>System Architecture</div>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                {p.architecture.map((layer,i)=>[
                  <div key={i} style={{display:'flex',gap:20,alignItems:'flex-start',padding:24,background:c.bg2,borderRadius:12,border:`1px solid ${c.border}`}}>
                    <div style={{width:48,height:48,borderRadius:12,background:c.gold2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,border:`1px solid ${c.goldB}`}}>
                      {['🥉','🥈','🥇','🏆'][i] || '📦'}
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:c.gold,marginBottom:6}}>{layer.layer}</div>
                      <div style={{fontSize:13,color:c.muted,lineHeight:1.8}}>{layer.desc}</div>
                    </div>
                  </div>
                ])}
              </div>
            </div>
          )}

          {activeTab==='metrics' && (
            <div style={{animation:'fadeUp .4s ease'}}>
              <div style={{fontSize:11,color:c.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:20,fontWeight:500}}>Key Metrics</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
                {p.metrics.map((m,i)=>[
                  <div key={i} style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:28,textAlign:'center',transition:'all .3s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=c.border2;e.currentTarget.style.transform='scale(1.02)'}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.transform='none'}}>
                    <div style={{fontSize:32,marginBottom:12}}>{m.icon}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:28,fontWeight:700,color:c.gold,marginBottom:6}}>{m.value}</div>
                    <div style={{fontSize:12,color:c.muted,letterSpacing:'1px'}}>{m.label}</div>
                  </div>
                ])}
              </div>
            </div>
          )}

          {activeTab==='challenges' && (
            <div style={{animation:'fadeUp .4s ease'}}>
              <div style={{fontSize:11,color:c.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:20,fontWeight:500}}>Challenges & Solutions</div>
              {p.challenges.map((ch,i)=>[
                <div key={i} style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:'24px 28px',marginBottom:14,transition:'all .3s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=c.border2}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border}}>
                  <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:12}}>
                    <span style={{color:c.danger,fontSize:16,flexShrink:0,marginTop:2}}>⚡</span>
                    <div style={{fontSize:13,color:c.text,fontWeight:500,lineHeight:1.6}}>{ch.q}</div>
                  </div>
                  <div style={{display:'flex',gap:12,alignItems:'flex-start',paddingLeft:28}}>
                    <span style={{color:c.success,fontSize:16,flexShrink:0,marginTop:2}}>✓</span>
                    <div style={{fontSize:13,color:c.muted,lineHeight:1.8}}>{ch.a}</div>
                  </div>
                </div>
              ])}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ANALYTICS DASHBOARD — OTP Secured
// ═══════════════════════════════════════════════════════════════
function AnalyticsDash({c, css, dark, step, setStep, pw, setPw, otp, setOtp, pwErr, otpErr, otpSent, onPasswordCheck, onOtpVerify, onClose, count}) {
  const [visitors, setVisitors] = useState([]);
  const [activeTab, setActiveTab] = useState('overview');
  const [dateRange, setDateRange] = useState('7');

  useEffect(()=>{ 
    document.body.style.overflow='hidden'; 
    setVisitors(VisitorSystem.getAll());
    return()=>{ document.body.style.overflow=''; }; 
  },[]);

  const filteredVisitors = useMemo(() => {
    const days = parseInt(dateRange);
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    return visitors.filter(v => new Date(v.date) >= cutoff);
  }, [visitors, dateRange]);

  const stats = useMemo(() => {
    const data = filteredVisitors.length ? filteredVisitors : visitors;
    return {
      byDevice: data.reduce((a,v)=>{a[v.device]=(a[v.device]||0)+1;return a},{}),
      byBrowser: data.reduce((a,v)=>{a[v.browser]=(a[v.browser]||0)+1;return a},{}),
      byOS: data.reduce((a,v)=>{a[v.os]=(a[v.os]||0)+1;return a},{}),
      byDay: data.reduce((a,v)=>{a[v.day]=(a[v.day]||0)+1;return a},{}),
      names: [...new Set(data.map(v=>v.name))],
      recent: data.slice(0,15)
    };
  }, [filteredVisitors, visitors]);

  const dashTabs = ['overview','visitors','devices','export'];

  return (
    <div style={{position:'fixed',inset:0,zIndex:900,background:'rgba(4,8,15,0.97)',
      backdropFilter:'blur(24px)',overflowY:'auto',display:'flex',alignItems:'flex-start',
      justifyContent:'center',padding:'40px 20px'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:c.card,border:`1px solid ${c.border2}`,borderRadius:24,maxWidth:1000,
        width:'100%',padding:40,position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:20,right:24,background:'none',
          border:`1px solid ${c.border}`,borderRadius:'50%',width:44,height:44,cursor:'none',
          color:c.text,fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',
          transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=c.gold;e.currentTarget.style.color=c.gold}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.color=c.text}}>✕</button>

        <div style={{fontFamily:"'Cinzel',serif",fontSize:28,fontWeight:700,color:c.gold,marginBottom:6}}>
          📊 Visitor Analytics
        </div>
        <div style={{fontSize:12,color:c.muted,marginBottom:32,fontStyle:'italic',display:'flex',alignItems:'center',gap:12}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:c.danger,display:'inline-block'}}></span>
          Owner-only dashboard · {count} total visits recorded
        </div>

        {step !== 'unlocked' ? (
          <div style={{maxWidth:420,margin:'0 auto',textAlign:'center',padding:'30px 0'}}>
            {step === 'password' ? (
              <div style={{animation:'fadeUp .5s ease'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:c.gold2,border:`1px solid ${c.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:28}}>🔐</div>
                <p style={{fontSize:15,color:c.muted,lineHeight:1.9,marginBottom:28,fontStyle:'italic'}}>
                  This analytics dashboard is secured with two-factor authentication.<br/>Enter your owner password to proceed.
                </p>
                <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&onPasswordCheck()}
                  placeholder="Enter owner password..." style={{...css.input, marginBottom:16, textAlign:'center', fontSize:14}}/>
                <MagneticButton style={{...css.btn, width:'100%'}} onClick={onPasswordCheck}>
                  Continue →
                </MagneticButton>
                {pwErr&&<div style={{color:c.danger,fontSize:12,marginTop:14,animation:'fadeUp .3s ease'}}>Incorrect password. Try again.</div>}
              </div>
            ) : (
              <div style={{animation:'fadeUp .5s ease'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:c.gold2,border:`1px solid ${c.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:28}}>📱</div>
                <p style={{fontSize:15,color:c.muted,lineHeight:1.9,marginBottom:12,fontStyle:'italic'}}>
                  A one-time password has been generated.<br/>Enter it below to unlock the dashboard.
                </p>
                <div style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:8,padding:'12px 16px',marginBottom:20,fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:c.gold}}>
                  {otpSent ? '✓ OTP generated (check console for testing)' : 'Generating OTP...'}
                </div>
                <input type="text" value={otp} onChange={e=>setOtp(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&onOtpVerify()}
                  placeholder="Enter 6-digit OTP..." style={{...css.input, marginBottom:16, textAlign:'center', fontSize:14, letterSpacing:'8px'}}
                  maxLength={6}/>
                <div style={{display:'flex',gap:12}}>
                  <button onClick={()=>{setStep('password');setPw('');setOtp('');}} style={{...css.btnGhost,flex:1}}>
                    ← Back
                  </button>
                  <MagneticButton style={{...css.btn,flex:2}} onClick={onOtpVerify}>
                    Verify & Unlock
                  </MagneticButton>
                </div>
                {otpErr&&<div style={{color:c.danger,fontSize:12,marginTop:14,animation:'fadeUp .3s ease'}}>Invalid or expired OTP. Try again.</div>}
              </div>
            )}
          </div>
        ) : (
          <div style={{animation:'fadeUp .5s ease'}}>
            {/* Dashboard Tabs */}
            <div style={{display:'flex',gap:4,marginBottom:28,borderBottom:`1px solid ${c.border}`,paddingBottom:4}}>
              {dashTabs.map(tab=>[
                <button key={tab} onClick={()=>setActiveTab(tab)}
                  style={{padding:'10px 20px',background:activeTab===tab?c.accent3:'none',border:'none',borderRadius:8,
                    color:activeTab===tab?c.gold:c.muted,fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:500,
                    textTransform:'uppercase',letterSpacing:'1px',cursor:'none',transition:'all .3s'}}>
                  {tab}
                </button>
              ])}
            </div>

            {/* Date Filter */}
            <div style={{display:'flex',gap:8,marginBottom:24,alignItems:'center'}}>
              <span style={{fontSize:11,color:c.muted,letterSpacing:'1px'}}>Period:</span>
              {[{v:'7',l:'7 Days'},{v:'30',l:'30 Days'},{v:'90',l:'90 Days'},{v:'all',l:'All Time'}].map(opt=>[
                <button key={opt.v} onClick={()=>setDateRange(opt.v)}
                  style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${dateRange===opt.v?c.goldB:c.border}`,
                    background:dateRange===opt.v?c.accent3:'none',color:dateRange===opt.v?c.gold:c.muted,
                    fontSize:11,cursor:'none',transition:'all .3s'}}>
                  {opt.l}
                </button>
              ])}
            </div>

            {activeTab==='overview' && (
              <div>
                {/* KPI Cards */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
                  {[
                    {v:count,l:'Total Visits',icon:'👁️'},
                    {v:stats.byDevice['Mobile']||0,l:'Mobile Users',icon:'📱'},
                    {v:stats.byDevice['Desktop']||0,l:'Desktop Users',icon:'💻'},
                    {v:stats.names.length,l:'Unique Names',icon:'👤'},
                  ].map((k,i)=>[
                    <div key={i} style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:24,textAlign:'center',transition:'all .3s'}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor=c.border2;e.currentTarget.style.transform='translateY(-4px)'}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.transform='none'}}>
                      <div style={{fontSize:28,marginBottom:8}}>{k.icon}</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:32,fontWeight:700,color:c.gold}}>{k.v}</div>
                      <div style={{fontSize:10,color:c.muted,marginTop:6,letterSpacing:'1px',textTransform:'uppercase'}}>{k.l}</div>
                    </div>
                  ])}
                </div>

                {/* Charts */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:28}}>
                  {[
                    {title:'By Browser', data:stats.byBrowser},
                    {title:'By OS', data:stats.byOS},
                  ].map(chart=>[
                    <div key={chart.title} style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:20}}>
                      <div style={{fontSize:11,color:c.muted,letterSpacing:'2px',textTransform:'uppercase',marginBottom:16,fontWeight:500}}>{chart.title}</div>
                      {Object.entries(chart.data).map(([k,v])=>[
                        <div key={k} style={{marginBottom:12}}>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:c.text,marginBottom:6,fontWeight:500}}>
                            <span>{k}</span><span style={{color:c.gold,fontFamily:"'JetBrains Mono',monospace"}}>{v}</span>
                          </div>
                          <div style={{height:6,background:c.subtle,borderRadius:3,overflow:'hidden'}}>
                            <div className="infometric-bar-fill" style={{width:`${Math.max(5,Math.round(v/count*100))}%`,background:`linear-gradient(90deg,${c.gold},${c.accent2})`,borderRadius:3}}></div>
                          </div>
                        </div>
                      ])}
                    </div>
                  ])}
                </div>
              </div>
            )}

            {activeTab==='visitors' && (
              <div>
                <div style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,overflow:'hidden'}}>
                  <div style={{padding:'16px 20px',borderBottom:`1px solid ${c.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:11,color:c.muted,letterSpacing:'2px',textTransform:'uppercase',fontWeight:500}}>Recent Visitors</span>
                    <span style={{fontSize:11,color:c.gold,fontFamily:"'JetBrains Mono',monospace"}}>{stats.recent.length} shown</span>
                  </div>
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:"'Inter',sans-serif"}}>
                      <thead>
                        <tr style={{background:c.card}}>
                          {['Name','Date','Time','Device','Browser','OS','Screen'].map(h=>[
                            <th key={h} style={{padding:'12px 14px',textAlign:'left',color:c.muted,fontWeight:500,
                              letterSpacing:'1px',fontSize:10,textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                          ])}
                        </tr>
                      </thead>
                      <tbody>
                        {stats.recent.length===0 ? (
                          <tr><td colSpan={7} style={{padding:'30px',textAlign:'center',color:c.muted,fontStyle:'italic'}}>No visitor data in selected period</td></tr>
                        ) : stats.recent.map((v,i)=>[
                          <tr key={v.id} style={{borderTop:`1px solid ${c.border}`,background:i%2===0?'transparent':c.card}}>
                            {[v.name,v.date,v.time,v.device,v.browser,v.os,v.screen].map((val,j)=>[
                              <td key={j} style={{padding:'11px 14px',color:j===0?c.gold:c.text,whiteSpace:'nowrap',fontWeight:j===0?600:400}}>{val}</td>
                            ])}
                          </tr>
                        ])}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {activeTab==='devices' && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
                {[
                  {title:'Device Breakdown', data:stats.byDevice},
                  {title:'Day of Week', data:stats.byDay},
                  {title:'Top Browsers', data:Object.entries(stats.byBrowser).sort((a,b)=>b[1]-a[1]).slice(0,5).reduce((a,[k,v])=>{a[k]=v;return a},{})},
                ].map(chart=>[
                  <div key={chart.title} style={{background:c.bg2,border:`1px solid ${c.border}`,borderRadius:12,padding:20}}>
                    <div style={{fontSize:11,color:c.muted,letterSpacing:'2px',textTransform:'uppercase',marginBottom:16,fontWeight:500}}>{chart.title}</div>
                    {Object.entries(chart.data).map(([k,v])=>[
                      <div key={k} style={{marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:c.text,marginBottom:4}}>
                          <span>{k}</span><span style={{color:c.gold}}>{v}</span>
                        </div>
                        <div style={{height:4,background:c.subtle,borderRadius:2}}>
                          <div style={{height:'100%',width:`${Math.round(v/count*100)}%`,background:c.gold,borderRadius:2}}></div>
                        </div>
                      </div>
                    ])}
                  </div>
                ])}
              </div>
            )}

            {activeTab==='export' && (
              <div style={{textAlign:'center',padding:'40px 20px'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:c.gold2,border:`1px solid ${c.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:28}}>📥</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:600,color:c.gold,marginBottom:12}}>Export Data</div>
                <div style={{fontSize:14,color:c.muted,marginBottom:28,maxWidth:400,margin:'0 auto 28px',lineHeight:1.8}}>
                  Download all visitor data as a CSV spreadsheet for analysis in Excel, Google Sheets, or Power BI.
                </div>
                <MagneticButton style={css.btn} onClick={VisitorSystem.exportCSV}>
                  ⬇ Export to CSV
                </MagneticButton>
                <div style={{marginTop:20,display:'flex',gap:12,justifyContent:'center'}}>
                  <button onClick={()=>{if(confirm('Clear ALL visitor data? This cannot be undone.')){VisitorSystem.clearAll();setVisitors([]);}}} 
                    style={{...css.btnGhost,fontSize:11,padding:'10px 20px'}}>
                    🗑 Clear All Data
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
